# cerber example configuration. Copy to config.yaml and fill in real values.
# cerber only ever contacts the provider base_url below (see AUDIT.md).

server:
  addr: ":8080"

# Logging: structured zap logs to <dir>/<YYYY-MM-DD>.log and stdout.
logging:
  level: "info"   # debug | info | warn | error
  dir: "./logs"

# Directory where `cerber --claude-login` writes OAuth tokens; loaded at startup
# and merged with the Anthropic credentials below. Refreshed tokens are written
# back here, so OAuth logins survive restarts.
auth_dir: "./auths"

# Client API keys allowed to call cerber (clients send one of these as
# `Authorization: Bearer <key>` or `x-api-key: <key>`).
access:
  # allow_localhost: accept any (or no) key from 127.0.0.1/::1 — handy for a local
  # Claude Code that sends its own token. Remote clients still need a key below.
  allow_localhost: true
  keys:
    - "change-me-client-key"
  # management_key: if set, /admin/* requires this key (not the client keys above).
  # management_key: "change-me-admin-key"
  # default_key_limits: budgets/rate-limits applied to NEW dashboard-minted keys
  # (cer_… keys). Static keys above and loopback bypass governance. Edit a key's
  # limits at runtime via POST /admin/keys/{name}/limits. Zero = unlimited.
  # default_key_limits:
  #   max_cost_usd: 50          # cost cap (from usage.pricing) per budget_period
  #   budget_period: month      # minute|hour|day|week|month (default month)
  #   max_requests: 600         # request cap per rate_period
  #   max_tokens: 2000000       # input+output token cap per rate_period
  #   rate_period: minute       # minute|hour|day|week|month (default minute)

# Persist usage to disk (survives restart) and price models for cost reporting.
usage:
  file: "./data/usage.json"
  # pricing:                       # cost per 1,000,000 tokens
  #   claude-sonnet-4-6: { input: 3, output: 15 }
  #   gpt-4o-mini:       { input: 0.15, output: 0.6 }
  # recent_log: 1000               # # of recent per-request events kept in memory
  #                                # (GET /admin/requests: who/IP/UA/model/tokens/cost)

providers:
  # Multiple providers can be enabled; on /v1/chat/completions cerber routes by
  # model name (gpt*/o1*/o3*/o4*/chatgpt* -> openai, gemini* -> gemini,
  # grok* -> grok, claude* -> anthropic). Models a probed provider advertises
  # (e.g. ollama) also route automatically. An unknown model is rejected (400),
  # not silently sent to anthropic. Override/add prefixes with `routing` below.
  # strategy: round-robin   # or "fill-first" (drain one account before the next)
  # routing:
  #   - { prefix: "gpt", provider: openai }
  #   - { prefix: "gemini", provider: gemini }
  # model_aliases: map a stable client-facing name to the canonical model a
  # provider serves; resolved before routing and before the upstream call.
  # model_aliases:
  #   opus: "claude-opus-4-20250514"
  #   sonnet: "claude-sonnet-4-20250514"
  # fallbacks: on /v1/chat/completions, retry a failed model (5xx / no credential
  # available) against the next model in `to` — which may be another provider.
  # Clients can override per-request with `X-Cerber-Fallback: gpt-4o,gemini-2.0`.
  # fallbacks:
  #   - { model: "claude", to: ["gpt-4o", "gemini-2.0-flash"] }

  # openai:
  #   base_url: "https://api.openai.com"
  #   credentials:
  #     - { type: api_key, name: oai, key: "${OPENAI_KEY}" }

  # gemini:
  #   base_url: "https://generativelanguage.googleapis.com"
  #   credentials:
  #     - { type: api_key, name: gem, key: "${GEMINI_KEY}" }

  # grok:   # xAI, OpenAI-compatible; routes grok* models here
  #   base_url: "https://api.x.ai"
  #   credentials:
  #     - { type: api_key, name: grok, key: "${GROK_API_KEY}" }

  # ollama:  # local ollama/vLLM (OpenAI-compatible); needs no API key.
  #   base_url: "http://localhost:11434"   # e.g. "http://gpu0:11434" on the LAN
  #   # Model names are arbitrary, so route them explicitly under `routing` above:
  #   #   - { prefix: "llama",  provider: ollama }
  #   #   - { prefix: "qwen",   provider: ollama }
  #   # credentials are optional; omit them entirely for a keyless local server.

  anthropic:
    base_url: "https://api.anthropic.com"
    version: "2023-06-01"
    timeout: "120s"
    # One or more upstream accounts; cerber rotates across them and sidelines
    # any that hit auth/rate-limit errors.
    credentials:
      # Secrets can come from .env via ${VAR} (keeps them out of this file):
      - type: api_key
        name: playground
        key: "${PLAYGROUND_API_KEY}"
      - type: api_key
        name: account-a
        key: "sk-ant-..."
      # - type: oauth
      #   name: claude-code-account
      #   access_token: "..."
      #   refresh_token: "..."
