# cerber example configuration. Copy to config.yaml and fill in real values.
# cerber only ever contacts the provider base_url below (see AUDIT.md).

server:
  addr: ":8080"

# Logging: structured zap logs to <dir>/<YYYY-MM-DD>.log and stdout.
logging:
  level: "info"   # debug | info | warn | error
  dir: "./logs"

# Directory where `cerber --claude-login` writes OAuth tokens; loaded at startup
# and merged with the Anthropic credentials below. Refreshed tokens are written
# back here, so OAuth logins survive restarts.
auth_dir: "./auths"

# Client API keys allowed to call cerber (clients send one of these as
# `Authorization: Bearer <key>` or `x-api-key: <key>`).
access:
  # allow_localhost: accept any (or no) key from 127.0.0.1/::1 — handy for a local
  # Claude Code that sends its own token. Remote clients still need a key below.
  allow_localhost: true
  keys:
    - "change-me-client-key"

providers:
  # Multiple providers can be enabled; on /v1/chat/completions cerber routes by
  # model name (gpt*/o1*/o3*/o4*/chatgpt* -> openai, gemini* -> gemini,
  # everything else -> anthropic). Override with `routing` below.
  # routing:
  #   - { prefix: "gpt", provider: openai }
  #   - { prefix: "gemini", provider: gemini }

  # openai:
  #   base_url: "https://api.openai.com"
  #   credentials:
  #     - { type: api_key, name: oai, key: "${OPENAI_KEY}" }

  # gemini:
  #   base_url: "https://generativelanguage.googleapis.com"
  #   credentials:
  #     - { type: api_key, name: gem, key: "${GEMINI_KEY}" }

  # grok:   # xAI, OpenAI-compatible; routes grok* models here
  #   base_url: "https://api.x.ai"
  #   credentials:
  #     - { type: api_key, name: grok, key: "${GROK_API_KEY}" }

  anthropic:
    base_url: "https://api.anthropic.com"
    version: "2023-06-01"
    timeout: "120s"
    # One or more upstream accounts; cerber rotates across them and sidelines
    # any that hit auth/rate-limit errors.
    credentials:
      # Secrets can come from .env via ${VAR} (keeps them out of this file):
      - type: api_key
        name: playground
        key: "${PLAYGROUND_API_KEY}"
      - type: api_key
        name: account-a
        key: "sk-ant-..."
      # - type: oauth
      #   name: claude-code-account
      #   access_token: "..."
      #   refresh_token: "..."
