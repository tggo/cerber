<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cerber · usage</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<style>
  :root {
    --bg:#0f1115; --panel:#171a21; --line:#262b36; --fg:#e6e9ef; --muted:#8b93a7;
    --accent:#7c9cff; --err:#ff7b72; --ok:#5ad17e;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
    font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
  header { display:flex; align-items:center; gap:12px; padding:16px 22px;
    border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg); }
  header h1 { font-size:16px; margin:0; letter-spacing:.5px; }
  header h1 span { color:var(--accent); }
  .grow { flex:1; }
  input, button { font:inherit; color:var(--fg); background:var(--panel);
    border:1px solid var(--line); border-radius:8px; padding:7px 11px; }
  input { width:300px; }
  button { cursor:pointer; }
  button:hover { border-color:var(--accent); }
  main { padding:22px; display:grid; gap:22px; max-width:1100px; margin:0 auto; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px; }
  .card .k { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.6px; }
  .card .v { font-size:26px; margin-top:6px; }
  section h2 { font-size:13px; color:var(--muted); text-transform:uppercase;
    letter-spacing:.6px; margin:0 0 10px; }
  table { width:100%; border-collapse:collapse; background:var(--panel);
    border:1px solid var(--line); border-radius:12px; overflow:hidden; }
  th, td { text-align:right; padding:9px 14px; border-bottom:1px solid var(--line); }
  th:first-child, td:first-child { text-align:left; }
  th { color:var(--muted); font-weight:600; font-size:12px; }
  tr:last-child td { border-bottom:none; }
  .err { color:var(--err); }
  .muted { color:var(--muted); }
  #status { font-size:12px; }
  .chart { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px; }
  .chart svg { width:100%; height:130px; display:block; }
  .chart rect.req { fill:var(--accent); }
  .chart rect.err { fill:var(--err); }
  .chart text { fill:var(--muted); font-size:10px; }
  .keybar { display:flex; gap:10px; margin-bottom:12px; }
  .keybar input { flex:1; width:auto; }
  #newKeyReveal { margin-bottom:12px; }
  #newKeyReveal .reveal { background:var(--panel); border:1px solid var(--ok);
    border-radius:10px; padding:12px 14px; display:flex; gap:10px; align-items:center; }
  #newKeyReveal code { color:var(--ok); word-break:break-all; flex:1; }
  button.danger:hover { border-color:var(--err); color:var(--err); }
  td .row-actions { display:flex; gap:6px; justify-content:flex-end; }
  td a { color:var(--accent); text-decoration:none; }
  td a:hover { text-decoration:underline; }
  tr.detail > td { padding:0 14px 10px; border-bottom:1px solid var(--line); }
  table.sub { width:100%; border:1px solid var(--line); border-radius:8px; }
  table.sub th, table.sub td { padding:5px 10px; font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>cerber<span>·</span>usage</h1>
  <span id="status" class="muted">enter client key →</span>
  <span class="grow"></span>
  <input id="key" type="password" placeholder="client API key" autocomplete="off">
  <label class="muted"><input id="auto" type="checkbox" style="width:auto" checked> auto</label>
  <button id="refresh">refresh</button>
</header>
<main>
  <div class="cards" id="cards"></div>
  <section><h2>requests / hour (last 48h)</h2><div id="chart" class="chart"></div></section>
  <section><h2>providers</h2><table id="providers"></table></section>
  <section><h2>accounts (credentials)</h2><table id="accounts"></table></section>
  <section>
    <h2>client keys</h2>
    <div class="keybar">
      <input id="newKeyName" placeholder="new key name (e.g. laptop, ci)" autocomplete="off">
      <button id="createKey">create key</button>
    </div>
    <div id="newKeyReveal"></div>
    <table id="keys"></table>
  </section>
  <section><h2>by credential</h2><table id="byCred"></table></section>
  <section><h2>by model</h2><table id="byModel"></table></section>
  <section id="reqSection">
    <h2>recent requests <span class="muted" style="font-weight:400">— who called what</span></h2>
    <div class="keybar">
      <select id="fModel"><option value="">all models</option></select>
      <select id="fProvider"><option value="">all providers</option></select>
      <select id="fCred"><option value="">all accounts</option></select>
      <button id="reqReset" class="muted">reset</button>
      <span class="grow"></span>
      <span id="reqInfo" class="muted"></span>
    </div>
    <table id="requests"></table>
    <div style="text-align:center;margin-top:10px">
      <button id="reqMore">load more</button>
    </div>
  </section>
</main>
<script>
  const $ = (id) => document.getElementById(id);
  const key = $("key");
  key.value = localStorage.getItem("cerber_key") || "";
  key.addEventListener("change", () => localStorage.setItem("cerber_key", key.value));

  const fmt = (n) => (n ?? 0).toLocaleString();
  const esc = (s) => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const usd = (c) => c ? "$" + (c >= 1 ? c.toFixed(2) : c.toFixed(4)) : "—";
  const cssId = (s) => String(s).replace(/[^a-zA-Z0-9_-]/g, "_");
  const ago = (unix) => {
    if (!unix) return "—";
    const s = Math.max(0, Math.floor(Date.now()/1000 - unix));
    if (s < 60) return s + "s";
    if (s < 3600) return Math.floor(s/60) + "m";
    return Math.floor(s/3600) + "h";
  };

  function rows(tbl, items, head, withCost) {
    const h = "<tr>" + head.map(c => `<th>${c}</th>`).join("") + "</tr>";
    const body = items.map(e => `<tr>
      <td>${esc(e.name)}</td>
      <td>${fmt(e.requests)}</td>
      <td class="${e.errors ? 'err' : 'muted'}">${fmt(e.errors)}</td>
      <td>${fmt(e.input_tokens)}</td>
      <td>${fmt(e.output_tokens)}</td>
      ${withCost ? `<td class="muted">${usd(e.cost)}</td>` : ""}
      <td class="muted">${ago(e.last_used && Date.parse(e.last_used)/1000)}</td>
    </tr>`).join("");
    tbl.innerHTML = h + (body || `<tr><td colspan="${head.length}" class="muted">no data</td></tr>`);
  }

  // Per-key cumulative usage (name -> {cost, requests, by_model:[…]}), filled from
  // /admin/stats.by_client and rendered as an expandable row under each key.
  let byClientMap = {};

  async function load() {
    // Try anyway with no key: on the LAN, nginx injects the key for us (keyless).
    // Only prompt for a key if the server actually rejects us (401).
    try {
      const r = await fetch("/admin/stats", { headers: authHeaders() });
      if (r.status === 401) { $("status").textContent = "enter client key →"; return; }
      if (!r.ok) { $("status").innerHTML = `<span class="err">HTTP ${r.status}</span>`; return; }
      const d = await r.json();
      const t = d.totals || {};
      $("cards").innerHTML = [
        ["requests", fmt(t.requests)],
        ["errors", fmt(t.errors)],
        ["input tokens", fmt(t.input_tokens)],
        ["output tokens", fmt(t.output_tokens)],
        ["cost", "$" + (d.total_cost || 0).toFixed(2)],
      ].map(([k,v]) => `<div class="card"><div class="k">${k}</div><div class="v">${v}</div></div>`).join("");
      rows($("byCred"), d.by_credential || [], ["name","requests","errors","input","output","last"]);
      rows($("byModel"), d.by_model || [], ["name","requests","errors","input","output","cost","last"], true);
      byClientMap = Object.fromEntries((d.by_client || []).map(c => [c.name, c]));
      setOpts($("fModel"), (d.by_model || []).map(m => m.name));
      renderChart(d.series || []);
      loadProviders();
      loadAccounts();
      loadKeys();
      refreshRequests();
      $("status").innerHTML = `<span class="ok" style="color:var(--ok)">●</span> updated ${new Date().toLocaleTimeString()}`;
    } catch (e) {
      $("status").innerHTML = `<span class="err">${e}</span>`;
    }
  }

  function renderChart(series) {
    const data = series.slice(-48);
    if (!data.length) { $("chart").innerHTML = `<div class="muted">no data yet</div>`; return; }
    const W = 1000, H = 130, pad = 16, n = data.length;
    const max = Math.max(1, ...data.map(b => b.requests || 0));
    const bw = (W - 2*pad) / n;
    const bars = data.map((b, i) => {
      const x = pad + i*bw;
      const h = (b.requests || 0) / max * (H - 2*pad);
      const eh = (b.errors || 0) / max * (H - 2*pad);
      const d = new Date(b.unix*1000);
      const t = d.toLocaleString(undefined,{month:"short",day:"numeric",hour:"2-digit"});
      const title = `${t}\n${b.requests||0} req, ${b.errors||0} err\nin ${fmt(b.input_tokens)} / out ${fmt(b.output_tokens)} tok`;
      return `<g><title>${title}</title>`
        + `<rect class="req" x="${x+1}" y="${H-pad-h}" width="${Math.max(1,bw-2)}" height="${h}"/>`
        + (eh>0?`<rect class="err" x="${x+1}" y="${H-pad-eh}" width="${Math.max(1,bw-2)}" height="${eh}"/>`:"")
        + `</g>`;
    }).join("");
    const first = new Date(data[0].unix*1000).toLocaleString(undefined,{month:"short",day:"numeric",hour:"2-digit"});
    const last = new Date(data[n-1].unix*1000).toLocaleString(undefined,{hour:"2-digit"});
    $("chart").innerHTML = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">`
      + bars
      + `<text x="${pad}" y="${H-2}">${first}</text>`
      + `<text x="${W-pad}" y="${H-2}" text-anchor="end">${last} · peak ${max}</text>`
      + `</svg>`;
  }

  // Recent-requests log: default last 10, endless "load more", filter by
  // model/provider/account. Auto-refresh only disturbs the list while the user is
  // at the top (page 1, no filter) so browsing/pagination isn't reset.
  const REQ_PAGE = 10;
  let reqRows = [], reqOffset = 0, reqTotal = 0;
  let reqFilters = { model: "", provider: "", credential: "" };
  const reqFilterActive = () => reqFilters.model || reqFilters.provider || reqFilters.credential;

  function refreshRequests() {
    if (reqOffset > REQ_PAGE || reqFilterActive()) return; // user is browsing
    loadRequests(true);
  }

  function setOpts(sel, values) {
    const cur = sel.value, allText = sel.options[0] ? sel.options[0].textContent : "all";
    const opts = [...new Set(values)].filter(Boolean).sort();
    sel.innerHTML = `<option value="">${esc(allText)}</option>` +
      opts.map(v => `<option${v === cur ? " selected" : ""}>${esc(v)}</option>`).join("");
  }

  async function loadRequests(reset) {
    if (reset) { reqOffset = 0; reqRows = []; }
    const qs = new URLSearchParams({ limit: REQ_PAGE, offset: reqOffset });
    if (reqFilters.model) qs.set("model", reqFilters.model);
    if (reqFilters.provider) qs.set("provider", reqFilters.provider);
    if (reqFilters.credential) qs.set("credential", reqFilters.credential);
    try {
      const r = await fetch("/admin/requests?" + qs, { headers: authHeaders() });
      if (!r.ok) { $("requests").innerHTML = `<tr><td class="muted">requests: HTTP ${r.status}</td></tr>`; return; }
      const d = await r.json();
      reqTotal = d.total || 0;
      reqRows = reqRows.concat(d.requests || []);
      reqOffset = reqRows.length;
      renderRequests();
    } catch (e) { $("requests").innerHTML = `<tr><td class="err">${esc(e)}</td></tr>`; }
  }

  function renderRequests() {
    const head = "<tr><th>when</th><th>client</th><th>ip</th><th>user-agent</th><th>provider</th><th>model</th><th>account</th><th>in</th><th>out</th><th>cost</th></tr>";
    const body = reqRows.map(e => {
      const t = e.time ? ago(Date.parse(e.time)/1000) : "—";
      const ua = (e.user_agent || "").slice(0, 48);
      const mdl = e.error ? `<span class="err" title="errored">${esc(e.model||"—")}</span>` : esc(e.model||"—");
      return `<tr>
        <td class="muted" title="${esc(e.time||"")}">${t}</td>
        <td>${esc(e.client||"—")}</td>
        <td class="muted">${esc(e.ip||"—")}</td>
        <td class="muted" title="${esc(e.user_agent||"")}">${esc(ua)}</td>
        <td class="muted">${esc(e.provider||"—")}</td>
        <td>${mdl}</td>
        <td class="muted">${esc(e.credential||"—")}</td>
        <td>${fmt(e.input_tokens)}</td>
        <td>${fmt(e.output_tokens)}</td>
        <td class="muted">${e.cost ? "$"+e.cost.toFixed(4) : "—"}</td>
      </tr>`;
    }).join("");
    $("requests").innerHTML = head + (body || `<tr><td colspan="10" class="muted">no requests yet</td></tr>`);
    $("reqInfo").textContent = reqTotal ? `showing ${reqRows.length} of ${reqTotal}` : "";
    $("reqMore").style.display = reqRows.length < reqTotal ? "" : "none";
  }

  ["fModel", "fProvider", "fCred"].forEach(id => $(id).addEventListener("change", () => {
    reqFilters = { model: $("fModel").value, provider: $("fProvider").value, credential: $("fCred").value };
    loadRequests(true);
  }));
  $("reqReset").addEventListener("click", () => {
    $("fModel").value = ""; $("fProvider").value = ""; $("fCred").value = "";
    reqFilters = { model: "", provider: "", credential: "" };
    loadRequests(true);
  });
  $("reqMore").addEventListener("click", () => loadRequests(false));

  async function loadAccounts() {
    try {
      const r = await fetch("/admin/accounts", { headers: authHeaders() });
      if (!r.ok) { $("accounts").innerHTML = `<tr><td class="muted">accounts: HTTP ${r.status}</td></tr>`; return; }
      const d = await r.json();
      const head = "<tr><th>provider</th><th>name</th><th>kind</th><th>key</th><th>state</th><th>requests</th><th>errors</th><th>5h quota</th><th></th></tr>";
      const body = (d.accounts || []).map(a => {
        const q = a.quota ? (Math.round((a.quota.five_hour.utilization || 0) * 100) + "%") : "—";
        const btn = a.enabled
          ? `<button data-n="${a.name}" data-act="disable">disable</button>`
          : `<button data-n="${a.name}" data-act="enable">enable</button>`;
        const state = a.cooling_down ? `<span class="err">cooling</span>` : (a.enabled ? `<span style="color:var(--ok)">on</span>` : `<span class="muted">off</span>`);
        let key;
        if (!a.health_checked) key = `<span class="muted">—</span>`;
        else if (a.healthy) key = `<span style="color:var(--ok)">✓ valid</span>`;
        else key = `<span class="err" title="${(a.health_error||'').replace(/"/g,'')}">✗ invalid</span>`;
        const chat = `<a href="/chat?provider=${encodeURIComponent(a.provider||'')}&cred=${encodeURIComponent(a.name)}" title="chat with this account">${a.name}</a>`;
        return `<tr><td class="muted">${a.provider||"—"}</td><td>${chat}</td><td class="muted">${a.kind}</td><td>${key}</td><td>${state}</td><td>${fmt(a.requests)}</td><td class="${a.errors?'err':'muted'}">${fmt(a.errors)}</td><td class="muted">${q}</td><td>${btn}</td></tr>`;
      }).join("");
      $("accounts").innerHTML = head + (body || `<tr><td colspan="9" class="muted">no accounts</td></tr>`);
      setOpts($("fProvider"), (d.accounts || []).map(a => a.provider));
      setOpts($("fCred"), (d.accounts || []).map(a => a.name));
      $("accounts").querySelectorAll("button").forEach(b => b.addEventListener("click", async () => {
        await fetch(`/admin/accounts/${encodeURIComponent(b.dataset.n)}/${b.dataset.act}`,
          { method: "POST", headers: authHeaders() });
        loadAccounts();
      }));
    } catch (e) { /* ignore */ }
  }

  async function loadProviders() {
    try {
      const r = await fetch("/admin/providers", { headers: authHeaders() });
      if (!r.ok) { $("providers").innerHTML = `<tr><td class="muted">providers: HTTP ${r.status}</td></tr>`; return; }
      const d = await r.json();
      const head = "<tr><th>provider</th><th>endpoint</th><th>keys ok</th><th>models</th></tr>";
      const body = (d.providers || []).map(p => {
        const total = p.credentials || 0, ok = p.healthy_credentials || 0;
        const cls = ok === 0 ? "err" : (ok < total ? "" : "");
        const keys = `<span class="${ok===0?'err':''}" style="${ok>0&&ok===total?'color:var(--ok)':''}">${ok}/${total}</span>`;
        const models = (p.models && p.models.length)
          ? `<span title="${p.models.join('\n')}">${p.models.length} ▾</span>`
          : `<span class="muted">—</span>`;
        return `<tr><td><a href="/chat?provider=${encodeURIComponent(p.name)}" title="chat with ${p.name}">${p.name}</a></td><td class="muted">${p.base_url||"—"}</td><td>${keys}</td><td class="muted">${models}</td></tr>`;
      }).join("");
      $("providers").innerHTML = head + (body || `<tr><td colspan="4" class="muted">no providers</td></tr>`);
    } catch (e) { /* ignore */ }
  }

  function authHeaders() { return { Authorization: "Bearer " + key.value }; }

  async function loadKeys() {
    try {
      const r = await fetch("/admin/keys", { headers: authHeaders() });
      if (!r.ok) { $("keys").innerHTML = `<tr><td class="muted">keys: HTTP ${r.status}</td></tr>`; return; }
      const d = await r.json();
      const head = "<tr><th>name</th><th>key</th><th>state</th><th>requests</th><th>tokens</th><th>spend</th><th>created</th><th>last used</th><th></th></tr>";
      const body = (d.keys || []).map(k => {
        const state = k.enabled ? `<span style="color:var(--ok)">on</span>` : `<span class="muted">off</span>`;
        const toggle = k.enabled
          ? `<button data-n="${k.name}" data-act="disable">disable</button>`
          : `<button data-n="${k.name}" data-act="enable">enable</button>`;
        const del = `<button class="danger" data-n="${k.name}" data-act="delete">delete</button>`;
        const created = k.created_at ? new Date(k.created_at).toLocaleDateString() : "—";
        const used = k.last_used_at && Date.parse(k.last_used_at) > 0 ? ago(Date.parse(k.last_used_at)/1000) : "—";
        const u = byClientMap[k.name];
        const tok = u ? fmt((u.input_tokens||0)+(u.output_tokens||0)) : "—";
        const spend = u ? usd(u.cost) : "—";
        const nm = (u && u.by_model && u.by_model.length)
          ? `<a href="#" class="expand" data-n="${k.name}">${k.name}</a>` : k.name;
        const detail = `<tr class="detail" id="kd-${cssId(k.name)}" hidden><td></td>
          <td colspan="8"><table class="sub"><tr><th>model</th><th>requests</th><th>input</th><th>output</th><th>cost</th></tr>${
            u && u.by_model ? u.by_model.map(m => `<tr><td>${esc(m.name)}</td><td>${fmt(m.requests)}</td><td>${fmt(m.input_tokens)}</td><td>${fmt(m.output_tokens)}</td><td class="muted">${usd(m.cost)}</td></tr>`).join("") : ""
          }</table></td></tr>`;
        return `<tr><td>${nm}</td><td class="muted">…${k.last4}</td><td>${state}</td>
          <td>${u?fmt(u.requests):"—"}</td><td>${tok}</td><td class="muted">${spend}</td>
          <td class="muted">${created}</td><td class="muted">${used}</td>
          <td><div class="row-actions">${toggle}${del}</div></td></tr>${detail}`;
      }).join("");
      $("keys").innerHTML = head + (body || `<tr><td colspan="9" class="muted">no keys yet</td></tr>`);
      $("keys").querySelectorAll("a.expand").forEach(a => a.addEventListener("click", (ev) => {
        ev.preventDefault();
        const row = document.getElementById("kd-" + cssId(a.dataset.n));
        if (row) row.hidden = !row.hidden;
      }));
      $("keys").querySelectorAll("button").forEach(b => b.addEventListener("click", async () => {
        const n = b.dataset.n, act = b.dataset.act;
        if (act === "delete") {
          if (!confirm(`Delete client key "${n}"? Anything using it stops working.`)) return;
          await fetch(`/admin/keys/${encodeURIComponent(n)}`, { method: "DELETE", headers: authHeaders() });
        } else {
          await fetch(`/admin/keys/${encodeURIComponent(n)}/${act}`, { method: "POST", headers: authHeaders() });
        }
        loadKeys();
      }));
    } catch (e) { /* ignore */ }
  }

  async function createKey() {
    const name = $("newKeyName").value.trim();
    if (!name) { $("newKeyName").focus(); return; }
    const r = await fetch("/admin/keys", {
      method: "POST", headers: { ...authHeaders(), "Content-Type": "application/json" },
      body: JSON.stringify({ name }),
    });
    if (!r.ok) {
      const e = await r.json().catch(() => ({}));
      $("newKeyReveal").innerHTML = `<div class="reveal" style="border-color:var(--err)"><span class="err">${e.error || ("HTTP " + r.status)}</span></div>`;
      return;
    }
    const d = await r.json();
    $("newKeyReveal").innerHTML = `<div class="reveal">
      <span class="muted">copy now — shown once:</span>
      <code id="newKeyVal">${d.key}</code>
      <button id="copyKey">copy</button></div>`;
    $("copyKey").addEventListener("click", () => {
      navigator.clipboard?.writeText(d.key);
      $("copyKey").textContent = "copied";
    });
    $("newKeyName").value = "";
    loadKeys();
  }

  $("createKey").addEventListener("click", createKey);
  $("newKeyName").addEventListener("keydown", (e) => { if (e.key === "Enter") createKey(); });
  $("refresh").addEventListener("click", load);
  setInterval(() => { if ($("auto").checked) load(); }, 5000);
  load();
</script>
</body>
</html>
