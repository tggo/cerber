# http-context maps for the cerber vhost. Installed to /etc/nginx/conf.d/.
#
# Split-horizon auth: LAN/WG clients (which reach firebat directly via the
# routers' internal DNS record cerber.ihatebot.com -> 192.168.88.35) get the
# client key injected for them — keyless from their side. Everyone else (the
# public Cloudflare path) must present their own Authorization header, which
# cerber validates. __CERBER_CLIENT_KEY__ is substituted by `make deploy`.
geo $cerber_lan {
    default        0;
    127.0.0.1/32   1;
    10.10.10.0/30  1;   # WireGuard home tunnel
    192.168.0.0/16 1;   # RentedHouse + HomeOffice LANs
}

map $cerber_lan $cerber_auth {
    1 "Bearer __CERBER_CLIENT_KEY__";   # LAN/WG: inject the key (keyless UX)
    0 $http_authorization;              # public: pass the client's own header
}
